<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Inventory Scanner</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #f5f7fb; color: #111; }
    .card { background: white; border-radius: 10px; padding: 16px; margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    button { background: #0f766e; color: white; border: 0; border-radius: 8px; padding: 10px 14px; cursor: pointer; }
    input { padding: 8px; }
    pre { background: #0f172a; color: #e2e8f0; padding: 12px; border-radius: 8px; overflow: auto; }
  </style>
</head>
<body>
  <h1>Smart Inventory Scanner</h1>
  <!-- Upload Shelf Image -->
  <div class="card">
    <h3>1) Upload Shelf Image</h3>
    <input id="image" type="file" accept="image/*" multiple />
    <button id="scanBtn">Scan</button>
    <pre id="scanOut">No scan yet.</pre>
    <button id="confirmBtn">Confirm Scan</button>
  </div>

  <!-- Scripts -->
  <script>
    let lastScan = null;
    // DOM Elements to store the output of the buttons
    // getElementById is used to get the element by its id
    // scanOut is used to store the output of the scan button
    const scanOut = document.getElementById("scanOut");

    // Scan Button to scan the image and get the output 
    // onclick is used to add a click event listener to the button
    // async is used to make the function asynchronous
    // file is used to store the image file
    // form is used to create a form data object to send the image file to the server
    // append is used to append the image file to the form data
    // fetch is used to fetch the scan from the server with the method POST and the body is the form data
    // lastScan is used to store the last scan
    // scanOut.textContent is used to store the output of the scan button in the HTML
    document.getElementById("scanBtn").onclick = async () => {
      const files = document.getElementById("image").files;
      if (!files || files.length === 0) return alert("Please choose at least one image first.");
      if (files.length > 10) return alert("Please upload up to 10 images at once.");
      const form = new FormData();
      for (let i = 0; i < files.length; i++) {
        form.append("image", files[i]);
      }
      const res = await fetch("/api/scan", { method: "POST", body: form });
      lastScan = await res.json();
      scanOut.textContent = JSON.stringify(lastScan, null, 2);
    };

    // Confirm Button to confirm the scan
    // if (!lastScan) is used to check if the last scan is not null
    // fetch is used to fetch the confirm scan from the server with the method POST and the body is the last scan
    document.getElementById("confirmBtn").onclick = async () => {
      if (!lastScan) return alert("Run scan first.");
      const res = await fetch("/api/confirm-scan", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(lastScan),
      });
      const result = await res.json();
      scanOut.textContent = JSON.stringify({ ...lastScan, confirm: result }, null, 2);
      alert("Scan confirmed.");
    };
  </script>
</body>
</html>
