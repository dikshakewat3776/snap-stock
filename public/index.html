<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Inventory Scanner - Web Portal</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #f5f7fb; color: #111; }
    .card { background: white; border-radius: 10px; padding: 16px; margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    button { background: #0f766e; color: white; border: 0; border-radius: 8px; padding: 10px 14px; cursor: pointer; }
    input { padding: 8px; }
    pre { background: #0f172a; color: #e2e8f0; padding: 12px; border-radius: 8px; overflow: auto; }
  </style>
</head>
<body>
  <h1>Smart Inventory Scanner (Web)</h1>

  <div class="card">
    <h3>1) Upload Shelf Image</h3>
    <input id="image" type="file" accept="image/*" />
    <button id="scanBtn">Scan</button>
    <pre id="scanOut">No scan yet.</pre>
    <button id="confirmBtn">Confirm & Update Inventory</button>
  </div>

  <div class="card">
    <h3>2) Inventory</h3>
    <button id="refreshInventory">Refresh Inventory</button>
    <pre id="inventoryOut"></pre>
  </div>

  <div class="card">
    <h3>3) Alerts + Reorder</h3>
    <button id="alertsBtn">Load Alerts</button>
    <button id="reorderBtn">Load Reorder</button>
    <button id="exportBtn">Export Text</button>
    <pre id="alertsOut"></pre>
  </div>

  <script>
    let lastScan = null;
    const scanOut = document.getElementById("scanOut");
    const inventoryOut = document.getElementById("inventoryOut");
    const alertsOut = document.getElementById("alertsOut");

    async function loadInventory() {
      const res = await fetch("/api/inventory");
      inventoryOut.textContent = JSON.stringify(await res.json(), null, 2);
    }

    document.getElementById("scanBtn").onclick = async () => {
      const file = document.getElementById("image").files[0];
      if (!file) return alert("Please choose an image first.");
      const form = new FormData();
      form.append("image", file);
      const res = await fetch("/api/scan", { method: "POST", body: form });
      lastScan = await res.json();
      scanOut.textContent = JSON.stringify(lastScan, null, 2);
    };

    document.getElementById("confirmBtn").onclick = async () => {
      if (!lastScan) return alert("Run scan first.");
      await fetch("/api/confirm-scan", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(lastScan),
      });
      await loadInventory();
      alert("Inventory updated.");
    };

    document.getElementById("refreshInventory").onclick = loadInventory;
    document.getElementById("alertsBtn").onclick = async () => {
      const res = await fetch("/api/alerts");
      alertsOut.textContent = JSON.stringify(await res.json(), null, 2);
    };
    document.getElementById("reorderBtn").onclick = async () => {
      const res = await fetch("/api/reorder");
      alertsOut.textContent = JSON.stringify(await res.json(), null, 2);
    };
    document.getElementById("exportBtn").onclick = async () => {
      const text = await (await fetch("/api/export/text")).text();
      alertsOut.textContent = text;
    };

    loadInventory();
  </script>
</body>
</html>
